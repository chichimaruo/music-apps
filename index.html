<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>音楽の授業アプリ</title>
<style>
  body{
    margin:0; padding:40px 16px; background:#f7f4ec; color:#2b2a28;
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",sans-serif;
  }
  main{max-width:680px; margin:0 auto;}
  h1{font-size:24px; letter-spacing:.05em;}
  a.app{
    display:block; background:#fff; border:2px solid #d8d2c4; border-radius:16px;
    padding:20px 22px; margin-top:16px; text-decoration:none; color:inherit;
    box-shadow:0 1px 4px rgba(0,0,0,.05);
  }
  a.app:hover{border-color:#c9a447;}
  .t{font-size:19px; font-weight:bold;}
  .d{font-size:14px; color:#6b675e; margin-top:6px; line-height:1.6;}
</style>
</head>
<body>
<main>
  <h1>🎵 音楽の授業アプリ</h1>
  <a class="app" href="./bolero/">
    <div class="t">🎺 ボレロ・オーケストラ実験室</div>
    <div class="d">ラヴェル《ボレロ》の旋律A・Bを、いろいろな楽器で聴きくらべよう。マイ・ボレロづくりと音色あてクイズも。</div>
  </a>
  <a class="app" href="./tenrankai/">
    <div class="t">🖼 展覧会の絵 鑑賞ラボ</div>
    <div class="d">ムソルグスキー《展覧会の絵》。音楽から絵をよみとくクイズ、プロムナードの聴き比べ、プログラムノートづくり、全曲ライブラリ。</div>
  </a>
  <a class="app" href="./goon/">
    <div class="t">🎋 五音音階クリエイター</div>
    <div class="d">日本の音階（民謡・都節・律・琉球）で、自分だけの4小節の旋律をつくろう。</div>
  </a>
</main>
</body>
</html>
